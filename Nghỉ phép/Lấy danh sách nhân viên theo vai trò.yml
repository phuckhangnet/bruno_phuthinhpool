info:
  name: Lấy danh sách nhân viên theo vai trò
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/Employee/GetListEmployee"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "SearchText": "",
          "PageNumber": 1,
          "PageSize": 100,
          "RoleCode":"ADMIN",
          "IsLock": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

