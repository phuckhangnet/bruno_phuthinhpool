info:
  name: Đăng xuất
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/Auth/Employee/Logout"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "AccessToken":"{{token}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
