info:
  name: Lấy tất cả thông báo
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/NotificationBadge/GetAll"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "14"
  body:
    type: json
    data: |-
      {
          "NotifyType":"THONG_BAO", // THONG_BAO DON_HANG | UU_DAI 
          "PageNumber": 1,
          "PageSize": 30
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
