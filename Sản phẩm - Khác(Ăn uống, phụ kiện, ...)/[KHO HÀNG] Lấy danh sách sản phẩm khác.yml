info:
  name: "[KHO HÀNG] Lấy danh sách sản phẩm khác"
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/Product/Warehouse/GetAll"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "SearchText": "",
          "PageNumber": 1,
          "PageSize": 30,
          "ProductType":"AN_UONG",
          "InventoryQuantity": null,
          "PriceFrom":10000,
          "PriceTo":20000
          
          
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
