http:
  method: POST
  url: "{{url}}/Upload/Base64/Create"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |
      {

          "UploadFor":"CLASSROOM_IMAGE", // PRODUCT_IMAGE | STORE_IMAGE | CERTIFICATE | CUSTOMER_AVATAR | EMPLOYEE_AVATAR | CLASSROOM_IMAGE
        "FileType": "image/jpg", //  "image/png", "image/jpeg", "image/jpg," "application/pdf"
        "ItemId":1, // Id  sản phẩm | Id cửa hàng | ....
        "FileBase64": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
