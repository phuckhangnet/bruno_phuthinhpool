http:
  method: POST
  url: "{{url}}/Notes/Employee/Update"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "Id":2,
          "Name": "Update", //// Option
          //"TypeCode": // Option
         // "Description":// Option
         "Status":"DA_HUY" //  DANG_HOAT_DONT | DA_HUY
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

