http:
  method: POST
  url: "{{url}}/Employee/Status/Action"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "EmployeeID":13,
          "Action":"lock" // lock | active
      }
