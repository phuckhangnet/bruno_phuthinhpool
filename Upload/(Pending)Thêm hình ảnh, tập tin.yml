examples:
  - name: Thêm hình ảnh, tập tin
    request:
      url: "{{url}}/Upload/Base64/Create"
      method: POST
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      body:
        type: json
        data: |
          {

              "UploadFor":"PRODUCT_IMAGE", // PRODUCT_IMAGE | STORE_IMAGE | CERTIFICATE | CUSTOMER_AVATAR | EMPLOYEE_AVATAR
            "FileType": "image/jpg", //  "image/png", "image/jpeg", "image/jpg," "application/pdf"
            "ItemId":26, // Id  sản phẩm | Id cửa hàng | ....
            "FileBase64": ""
          }
    response:
      statusText: "200"
      headers:
        - name: Content-Length
          value: "140"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Thu, 17 Apr 2025 04:40:51 GMT
        - name: Server
          value: Kestrel
      body:
        type: json
        data: |-
          {
              "message": "Thành công",
              "metadata": {
                  "Id": 1,
                  "ItemId": 26,
