info:
  name: Lấy danh sách sản phẩm kết hợp
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/ProductCombos/GetAll"
  headers:
    - name: x-api-key
      value: pkn
  body:
    type: json
    data: |-
      {
         "SearchText":"",
         "PageNumber":1,
         "PageSize":10
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
