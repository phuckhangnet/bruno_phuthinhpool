info:
  name: Đánh dâu đã đọc tất cả tin
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/NotificationBadge/MarkAllAsRead"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
  body:
    type: json
    data: |-
      {
          "NotifyType":"DON_HANG"  // THONG_BAO DON_HANG | UU_DAI 
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
