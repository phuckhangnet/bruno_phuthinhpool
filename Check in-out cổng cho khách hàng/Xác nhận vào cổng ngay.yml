info:
  name: Xác nhận vào cổng ngay
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/CheckInOutCustomer/ConfirmCheckIn/Immediate"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "14"
  body:
    type: json
    data: |-
      {
          "OrderId":706,
          // "IsGuestCountConfirmed": true // true | false | null: Trường hợp khách dùng đơn hàng cũ check in thì sẽ kiểm tra số lượng vé còn sử dụng được so với số lượng khách sẽ check in thưc tế, nếu nhân viên xác nhận là đúng với số lượng vé cho phép thì truyền gái trị true để cho hceck in thành công.
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

