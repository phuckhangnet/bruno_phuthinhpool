docs:
  content: |-
    ## Tài liệu SignalR Notification Hub

    Dùng cho thông báo (Badge) ứng dụng khách hàng và quản lý

    ### 1\. URL kết nối Hub

    Tất cả các kết nối SignalR sẽ được thiết lập với Hub có tên `NotificationHub`.

    - **Endpoint:** {{url}}`/notificationHub`
        

    ### 2\. Yêu cầu xác thực

    Kết nối SignalR yêu cầu xác thực bằng **JWT Bearer Token**.

    - **Header:** `Authorization: Bearer`
        

    ### 3\. Phương thức Server-to-Client (Backend đẩy xuống Frontend)

    Các phương thức Frontend cần lắng nghe:

    #### 3.1. `ReceiveNewOrderNotification`

    - **Mô tả:** App khách hàng tạo đơn thì app QL sẽ nhận được một mẫu tin từ BE
        
    - **Kiểu dữ liệu tham số:** `object` (JSON payload)
        
    - `{ "Id": 123, "TypeMessage": "OrderNew", "Title": "Đơn hàng mới!", "Content": "Khách hàng [Tên khách hàng] vừa đặt một đơn hàng mới.", "CreatedDate": "2025-07-21T14:30:00Z" }`
        
    - JavaScriptconnection.on("**ReceiveNewOrderNotification**", (payload) => { console.log("Thông báo đơn hàng mới:", payload); // Hiển thị thông báo này lên UI;
        

    #### 3.2. `PermissionsChangedRequireRelogin`

    - **Mô tả:** Gửi thông báo khi quyền hạn của người dùng đã thay đổi và yêu cầu họ đăng nhập lại để làm mới phiên.
        
    - **Kiểu dữ liệu tham số:** `string`
        
    - Chi tiết bổ sung sau.
        

    #### 3.3. `ReceiveError`

    - **Mô tả:** Gửi một thông báo lỗi chung từ máy chủ nếu có vấn đề xảy ra trong quá trình xử lý yêu cầu từ client.
        
    - **Kiểu dữ liệu tham số:** `string`
        
    - **Ví dụ dữ liệu nhận được:** `"Đã xảy ra lỗi duyệt thông báo: [Chi tiết lỗi]"`
        
    - JavaScriptconnection.on("**ReceiveError**", (errorMessage) => { console.error("Lỗi từ máy chủ SignalR:", errorMessage); alert(\`Lỗi: ${errorMessage}\`);});
        

    ### 4\. Phương thức Client-to-Server (Frontend gọi lên Backend)

    Các phương thức Frontend sẽ gọi (invoke) đến BE:

    #### 4.1. `MarkAsRead`

    - **Mô tả:** Đánh dấu một thông báo cụ thể là đã đọc trong cơ sở dữ liệu.
        
    - **Kiểu dữ liệu tham số gửi đi:** `number`
        
    - **Ví dụ tham số:** `123` (ID của thông báo cần đánh dấu)
        
    - **Kết quả mong đợi:** Sau khi xử lý, server sẽ gửi lại một thông báo `UpdateNotificationBadge` để cập nhật số lượng thông báo chưa đọc.
        
    - // Giả sử 'connection' là đối tượng HubConnection đã được khởi tạo  
        `async function markNotificationAsRead(notificationId) { try { await connection.invoke("MarkAsRead", notificationId); console.log(Đã gửi yêu cầu đánh dấu thông báo ${notificationId} là đã đọc.); server sẽ gửi lại UpdateNotificationBadge } catch (err) { console.error("Lỗi khi gọi MarkAsRead:", err); } }`
        

    ---

