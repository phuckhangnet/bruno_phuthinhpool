info:
  name: Đánh đấu đã đọc tin theo id
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/NotificationBadge/MarkAsRead"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
  body:
    type: json
    data: |-
      {
          "NotifyId":1
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
