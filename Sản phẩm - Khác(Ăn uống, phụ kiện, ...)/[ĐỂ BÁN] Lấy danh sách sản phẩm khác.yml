info:
  name: "[ĐỂ BÁN] Lấy danh sách sản phẩm khác"
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/Product/FoodAndDrink/GetAll"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "AccessoryGroup": "PHU_KIEN", //// DO_CHOI | PHU_KIEN | ''
          "FoodGroup": "",// DO_AN | NUOC_UONG,
          "IsRentable": null, // true | false | null
          "SearchText": "",
          "ProductType":"PHU_KIEN", // AN_UONG | PHU_KIEN
          "PageNumber": 1,
          "PageSize": 30,
          "IsRentable": false,
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
