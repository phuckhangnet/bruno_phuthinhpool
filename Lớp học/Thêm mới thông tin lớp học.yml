info:
  name: Thêm mới thông tin lớp học
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/Classroom/Employee/AddNewInfo"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "Price": 500000,
          "MinimumCapacity": 6,
          "MaximumCapacity": 12,
          "ClassName": "Lớp bơi tự cứu hộ 500",
          "Description": "Khóa học chuyên biệt giúp học viên biết cách tự cứu mình trong các tình huống nguy hiểm dưới nước.",
          "StartDate": "2025-06-01T00:00:00",
          "EndDate": "2024-07-31T23:59:59",
          "IsMonday": true,
          "IsTuesday": false,
          "IsWednesday": false,
          "IsThursday": true,
          "IsFriday": false,
          "IsSaturday": false,
          "IsSunday": true,
          "MinimumAge": 12,
          "MaximumAge": 45,
          "StartTime": "07:00:00",
          "EndTime": "08:30:00",
          "ClassStatus": "DANG_MO",
          "IsTrialAllowed": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Hồ bơi mới
    request:
      url: "{{url}}/Pool/AddNew"
      method: POST
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      body:
        type: multipart-form
        data:
          - name: PoolCode
            type: text
            value: PT
          - name: PoolName
            type: text
            value: Phú Thịnh
          - name: Image
            type: file
            value:
              - postman-cloud:///1f00c6c1-216a-42c0-8efa-9453d804d894
    response:
      statusText: "200"
      headers:
        - name: Content-Length
          value: "485"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 04 Apr 2025 09:42:54 GMT
        - name: Server
          value: Kestrel
      body:
        type: json
        data: |-
          {
              "message": "Thành công",
              "metadata": {
                  "Id": 1,
                  "PoolCode": null,
                  "PoolName": "Phú Thịnh",
