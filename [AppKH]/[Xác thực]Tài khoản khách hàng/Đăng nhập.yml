info:
  name: Đăng nhập
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/Auth/Customer/LoginWithAccount"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: from
      value: web
      disabled: true
  body:
    type: json
    data: |2
       {
          "account":"hauphvnkh",
          "password":"123456",
          "TokenNofitication":"postman"
       }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

