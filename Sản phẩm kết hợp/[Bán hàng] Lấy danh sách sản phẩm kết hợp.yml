info:
  name: "[Bán hàng] Lấy danh sách sản phẩm kết hợp"
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/ProductCombos/Order/GetAll"
  headers:
    - name: x-api-key
      value: pkn
  body:
    type: json
    data: |-
      {
         "ComboId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

