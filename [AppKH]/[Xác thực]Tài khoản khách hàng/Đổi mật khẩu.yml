info:
  name: Đổi mật khẩu
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/Auth/Customer/ChangePassword"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: from
      value: web
      disabled: true
  body:
    type: json
    data: |-
      {
         "CustomerId":59,
         "OldPassword":"1234567",
         "NewPassword":"123456"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
