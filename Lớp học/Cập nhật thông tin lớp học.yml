info:
  name: Cập nhật thông tin lớp học
  type: http
  seq: 11

http:
  method: POST
  url: "{{url}}/Classroom/Employee/UpdateInfo"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "Id": 1,
          "Price":600000,
          "MinimumCapacity": 10,
          "MaximumCapacity": 30,
          "IsTrialAllowed":true,
            "ClassName": "Lớp học bơi bướm tre em",
            "Description": "Lớp học bơi bướm trẻ em",
            "StartDate": "2023-12-01T00:00:00", 
            "EndDate": "2023-12-31T23:59:59",
            "IsMonday": true,
            "IsTuesday": false,
            "IsWednesday": true,
            "IsThursday": false,
            "IsFriday": true,
            "IsSaturday": false,
            "IsSunday": false,
            "MinimumAge": 18,
            "MaximumAge": 35,
            "StartTime": "09:00:00",
            "EndTime": "11:00:00",
            "ClassStatus": "DANG_MO" //  (đang mở cho đăng kí ) DANG_MO, (đã đầy, không nhập đăng kí học viên nữa) DA_DAY, (đã kết thúc khoá học) DA_KET_THUC.
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Hồ bơi mới
    request:
      url: "{{url}}/Pool/AddNew"
      method: POST
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      body:
        type: multipart-form
        data:
          - name: PoolCode
            type: text
            value: PT
          - name: PoolName
            type: text
            value: Phú Thịnh
          - name: Image
            type: file
            value:
              - postman-cloud:///1f00c6c1-216a-42c0-8efa-9453d804d894
    response:
      statusText: "200"
      headers:
        - name: Content-Length
          value: "485"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 04 Apr 2025 09:42:54 GMT
        - name: Server
          value: Kestrel
      body:
        type: json
        data: |-
          {
              "message": "Thành công",
